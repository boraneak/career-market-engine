name: Daily Career Market Sync

on:
  schedule:
    # Runs at 00:00 UTC every day
    - cron: '0 0 * * *'
  workflow_dispatch:

jobs:
  scrape_and_upload:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Download previous database
        continue-on-error: true
        run: |
          # Try to download the latest database from releases
          LATEST_RELEASE=$(curl -s https://api.github.com/repos/${{ github.repository }}/releases/latest | jq -r '.tag_name // empty')
          if [ ! -z "$LATEST_RELEASE" ]; then
            echo "Found latest release: $LATEST_RELEASE"
            curl -L -o career_market.db "https://github.com/${{ github.repository }}/releases/download/$LATEST_RELEASE/career_market.db" 2>/dev/null || echo "Could not download previous DB, will create new one"
          else
            echo "No previous release found, will create new database"
          fi

      - name: Run Pipeline
        env:
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
        run: python runner.py

      - name: Create Release and Upload Database
        uses: softprops/action-gh-release@v1
        with:
          files: career_market.db
          tag_name: db-${{ github.run_number }}-${{ github.run_id }}
          name: Database Backup - Run ${{ github.run_number }}
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Clean up old releases (keep last 10)
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release list --limit 100 --json tagName -q '.[10:] | .[] | .tagName' | xargs -I {} gh release delete {} --yes || true

      - name: Workflow Status on Failure
        if: failure()
        run: echo "Pipeline failed! Check logs above. Database was NOT updated."
