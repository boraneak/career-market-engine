name: Daily Career Market Sync

on:
  schedule:
    # Runs at 00:00 UTC every day
    - cron: '0 0 * * *'
  workflow_dispatch:

jobs:
  scrape_and_commit:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Build Docker Image
        run: docker build -t cme-app .

      - name: Run Scraper
        env:
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
        run: |
          # We run without the volume mount first to let it update the internal DB
          docker run --name cme_container -e GROQ_API_KEY=$GROQ_API_KEY cme-app
          
          # Now we copy the updated DB OUT of the container back to the runner
          docker cp cme_container:/app/career_market.db ./career_market.db

      - name: Commit and Push Changes
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add career_market.db
          git commit -m "chore: automated daily database update [skip ci]" || echo "No changes to commit"
          git push
          